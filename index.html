<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Робот Шульга - Логічна гра</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .grid-cell { aspect-ratio: 1 / 1; }
    </style>
</head>
<body class="bg-[#1a4d5e] text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        // Важливо: у браузері Framer Motion доступний як window.Motion
        const motion = window.Motion.motion;
        const AnimatePresence = window.Motion.AnimatePresence;

        const GRID_SIZE = 5;
        const START_POS = { x: 1, y: 4 };
        const START_DIR = 'UP';
        const TARGET_POS = { x: 3, y: 4 };
        const MAX_STEPS = 100;

        const WALLS = new Set([
            "1,0-2,0", "2,1-2,2", "2,2-3,2", "1,3-2,3", "2,4-3,4", "4,3-4,4"
        ]);

        const DIR_VECTORS = {
            UP: { x: 0, y: -1 },
            LEFT: { x: -1, y: 0 },
            DOWN: { x: 0, y: 1 },
            RIGHT: { x: 1, y: 0 },
        };

        const ROTATE_LEFT = {
            UP: 'LEFT',
            LEFT: 'DOWN',
            DOWN: 'RIGHT',
            RIGHT: 'UP',
        };

        const isWallBetween = (p1, p2) => {
            const key1 = `${p1.x},${p1.y}-${p2.x},${p2.y}`;
            const key2 = `${p2.x},${p2.y}-${p1.params || p1.x},${p1.y}`; // Спрощено для безпеки
            const k1 = `${p1.x},${p1.y}-${p2.x},${p2.y}`;
            const k2 = `${p2.x},${p2.y}-${p1.x},${p1.y}`;
            return WALLS.has(k1) || WALLS.has(k2);
        };

        const isOutOfBounds = (p) => p.x < 0 || p.x >= GRID_SIZE || p.y < 0 || p.y >= GRID_SIZE;

        const Robot = ({ dir }) => {
            const rotation = { UP: 0, LEFT: -90, DOWN: 180, RIGHT: 90 }[dir];
            return (
                <motion.div
                    animate={{ rotate: rotation }}
                    className="w-full h-full flex items-center justify-center"
                >
                    <div className="w-4/5 h-4/5 rounded-full border-2 border-blue-500 bg-blue-100/50 flex items-center justify-center shadow-inner">
                        <div className="w-0 h-0 border-l-[8px] border-l-transparent border-r-[8px] border-r-transparent border-b-[14px] border-b-pink-500" style={{ transform: 'translateY(-2px)' }} />
                    </div>
                </motion.div>
            );
        };

        const App = () => {
            const [state, setState] = useState({
                pos: START_POS, dir: START_DIR, path: [START_POS], status: 'PLAYING', steps: 0
            });
            const [isSolving, setIsSolving] = useState(false);

            const resetGame = () => {
                setState({ pos: START_POS, dir: START_DIR, path: [START_POS], status: 'PLAYING', steps: 0 });
                setIsSolving(false);
            };

            const handleCellClick = (tx, ty) => {
                if (state.status !== 'PLAYING' || isSolving) return;
                const forwardVec = DIR_VECTORS[state.dir];
                const fPos = { x: state.pos.x + forwardVec.x, y: state.pos.y + forwardVec.y };
                const nDir = ROTATE_LEFT[state.dir];
                const lfVec = DIR_VECTORS[nDir];
                const lfPos = { x: state.pos.x + lfVec.x, y: state.pos.y + lfVec.y };

                let next = null;
                let nextD = state.dir;

                if (fPos.x === tx && fPos.y === ty && !isOutOfBounds(fPos) && !isWallBetween(state.pos, fPos)) {
                    next = fPos;
                } else if (lfPos.x === tx && lfPos.y === ty && !isOutOfBounds(lfPos) && !isWallBetween(state.pos, lfPos)) {
                    next = lfPos;
                    nextD = nDir;
                }

                if (next) {
                    const isWin = next.x === TARGET_POS.x && next.y === TARGET_POS.y;
                    setState(p => ({
                        ...p,
                        pos: next,
                        dir: nextD,
                        path: [...p.path, next],
                        steps: p.steps + 1,
                        status: isWin ? 'SUCCESS' : (p.steps + 1 >= MAX_STEPS ? 'FAILED' : 'PLAYING')
                    }));
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    <header className="max-w-4xl w-full mb-8 text-center">
                        <h1 className="text-2xl md:text-3xl font-bold mb-2">Робот Шульга</h1>
                        <p className="opacity-80">Допоможіть роботу дійти до фінішу (G). Ходити можна лише прямо або наліво+прямо.</p>
                    </header>

                    <main className="flex flex-col md:flex-row gap-8 items-center">
                        <div className="bg-white p-2 rounded-lg shadow-2xl">
                            <div className="grid grid-cols-5 border-2 border-gray-300" style={{ width: '300px', height: '300px' }}>
                                {[...Array(25)].map((_, i) => {
                                    const x = i % 5, y = Math.floor(i / 5);
                                    const isR = state.pos.x === x && state.pos.y === y;
                                    const isT = TARGET_POS.x === x && TARGET_POS.y === y;
                                    const isP = state.path.some(p => p.x === x && p.y === y);
                                    return (
                                        <div key={i} onClick={() => handleCellClick(x, y)} 
                                             className={`relative border border-gray-200 cursor-pointer flex items-center justify-center ${isT ? 'bg-green-100' : (isP ? 'bg-blue-100/50' : 'bg-gray-50/30')}`}>
                                            {isT && <span className="text-green-600 font-bold">G</span>}
                                            {isR && <Robot dir={state.dir} />}
                                            {isWallBetween({x,y}, {x:x+1,y}) && <div className="absolute top-0 right-0 bottom-0 w-1 bg-red-500 z-10" />}
                                            {isWallBetween({x,y}, {x,y:y+1}) && <div className="absolute left-0 right-0 bottom-0 h-1 bg-red-500 z-10" />}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        <div className="flex flex-col gap-4 w-48 text-black">
                            <div className="bg-white p-4 rounded-xl shadow text-center">
                                <div className="text-xs uppercase text-gray-500">Кроки</div>
                                <div className="text-3xl font-bold">{state.steps}</div>
                            </div>
                            <button onClick={resetGame} className="bg-orange-500 text-white p-3 rounded-xl hover:bg-orange-600 transition">Скинути</button>
                            {state.status === 'SUCCESS' && <div className="bg-green-500 text-white p-3 rounded-xl text-center font-bold animate-bounce">Перемога!</div>}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
