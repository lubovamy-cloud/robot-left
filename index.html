<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Робот Шульга - GitHub Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); border: 2px solid #4b5563; background: white; }
        .cell { aspect-ratio: 1/1; position: relative; border: 0.5px solid #e5e7eb; cursor: pointer; transition: background 0.2s; }
        .cell:hover { background-color: rgba(243, 244, 246, 0.8); }
        .wall-v { position: absolute; top: 0; right: -1px; bottom: 0; width: 4px; background: #ef4444; z-index: 20; }
        .wall-h { position: absolute; left: 0; right: 0; bottom: -1px; height: 4px; background: #ef4444; z-index: 20; }
        .robot { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 80%; height: 80%; }
        .success-overlay { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#1a4d5e] text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const GRID_SIZE = 5;
        const START_POS = { x: 1, y: 4 };
        const TARGET_POS = { x: 3, y: 4 };
        const START_DIR = 'UP';
        const MAX_STEPS = 100;

        const WALLS = new Set([
            "1,0-2,0", "2,1-2,2", "2,2-3,2", "1,3-2,3", "2,4-3,4", "4,3-4,4"
        ]);

        const DIR_VECTORS = {
            UP: { x: 0, y: -1 }, LEFT: { x: -1, y: 0 }, DOWN: { x: 0, y: 1 }, RIGHT: { x: 1, y: 0 }
        };

        const ROTATE_LEFT = {
            UP: 'LEFT', LEFT: 'DOWN', DOWN: 'RIGHT', RIGHT: 'UP'
        };

        const isWall = (p1, p2) => {
            return WALLS.has(`${p1.x},${p1.y}-${p2.x},${p2.y}`) || WALLS.has(`${p2.x},${p2.y}-${p1.x},${p1.y}`);
        };

        const RobotIcon = ({ dir }) => {
            const rotations = { UP: 0, LEFT: -90, DOWN: 180, RIGHT: 90 };
            return (
                <div className="robot flex items-center justify-center" style={{ transform: `rotate(${rotations[dir]}deg)` }}>
                    <div className="w-full h-full rounded-full border-2 border-blue-500 bg-blue-100 flex items-center justify-center shadow-md">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 5L19 18H5L12 5Z" fill="#ec4899" />
                        </svg>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [state, setState] = useState({
                pos: START_POS, dir: START_DIR, path: [START_POS], status: 'PLAYING', steps: 0
            });
            const [isSolving, setIsSolving] = useState(false);

            const reset = () => setState({
                pos: START_POS, dir: START_DIR, path: [START_POS], status: 'PLAYING', steps: 0
            });

            const solve = async () => {
                if (isSolving) return;
                setIsSolving(true);
                
                // Простий BFS для пошуку шляху
                const queue = [{ pos: state.status !== 'PLAYING' ? START_POS : state.pos, dir: state.status !== 'PLAYING' ? START_DIR : state.dir, path: [], steps: 0, dirs: [] }];
                const visited = new Set();
                let found = null;

                while(queue.length > 0) {
                    const curr = queue.shift();
                    const key = `${curr.pos.x},${curr.pos.y},${curr.dir}`;
                    if (visited.has(key)) continue;
                    visited.add(key);

                    if (curr.pos.x === TARGET_POS.x && curr.pos.y === TARGET_POS.y) { found = curr; break; }
                    if (curr.steps > 50) continue;

                    // Вперед
                    const fv = DIR_VECTORS[curr.dir];
                    const fp = { x: curr.pos.x + fv.x, y: curr.pos.y + fv.y };
                    if (fp.x >= 0 && fp.x < 5 && fp.y >= 0 && fp.y < 5 && !isWall(curr.pos, fp)) {
                        queue.push({ pos: fp, dir: curr.dir, path: [...curr.path, fp], steps: curr.steps + 1, dirs: [...curr.dirs, curr.dir] });
                    }

                    // Наліво + вперед
                    const ld = ROTATE_LEFT[curr.dir];
                    const lfv = DIR_VECTORS[ld];
                    const lfp = { x: curr.pos.x + lfv.x, y: curr.pos.y + lfv.y };
                    if (lfp.x >= 0 && lfp.x < 5 && lfp.y >= 0 && lfp.y < 5 && !isWall(curr.pos, lfp)) {
                        queue.push({ pos: lfp, dir: ld, path: [...curr.path, lfp], steps: curr.steps + 1, dirs: [...curr.dirs, ld] });
                    }
                }

                if (found) {
                    if (state.status !== 'PLAYING') reset();
                    let p = state.status !== 'PLAYING' ? [START_POS] : [...state.path];
                    for (let i = 0; i < found.path.length; i++) {
                        await new Promise(r => setTimeout(r, 400));
                        p.push(found.path[i]);
                        setState(s => ({ ...s, pos: found.path[i], dir: found.dirs[i], path: [...p], steps: s.steps + 1, status: i === found.path.length - 1 ? 'SUCCESS' : 'PLAYING' }));
                    }
                } else {
                    alert("Шлях не знайдено! Спробуйте скинути гру.");
                }
                setIsSolving(false);
            };

            const click = (x, y) => {
                if (state.status !== 'PLAYING' || isSolving) return;
                const fv = DIR_VECTORS[state.dir];
                const fp = { x: state.pos.x + fv.x, y: state.pos.y + fv.y };
                const ld = ROTATE_LEFT[state.dir];
                const lfv = DIR_VECTORS[ld];
                const lfp = { x: state.pos.x + lfv.x, y: state.pos.y + lfv.y };

                let next = null, nextD = state.dir;
                if (fp.x === x && fp.y === y && !isWall(state.pos, fp)) next = fp;
                else if (lfp.x === x && lfp.y === y && !isWall(state.pos, lfp)) { next = lfp; nextD = ld; }

                if (next) {
                    const win = next.x === TARGET_POS.x && next.y === TARGET_POS.y;
                    setState(s => ({ ...s, pos: next, dir: nextD, path: [...s.path, next], steps: s.steps + 1, status: win ? 'SUCCESS' : (s.steps + 1 >= MAX_STEPS ? 'FAILED' : 'PLAYING') }));
                }
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">
                    <div className="max-w-md w-full">
                        <h1 className="text-2xl font-bold mb-2 text-center">Робот Шульга</h1>
                        <p className="text-sm text-white/70 mb-6 text-center">Тільки вперед або наліво+вперед. Дійди до G!</p>
                        
                        <div className="grid-container mb-6 shadow-2xl">
                            {[...Array(25)].map((_, i) => {
                                const x = i % 5, y = Math.floor(i / 5);
                                const isR = state.pos.x === x && state.pos.y === y;
                                const isT = TARGET_POS.x === x && TARGET_POS.y === y;
                                const isP = state.path.some(p => p.x === x && p.y === y);
                                return (
                                    <div key={i} onClick={() => click(x, y)} className={`cell flex items-center justify-center ${isT ? 'bg-green-200' : (isP ? 'bg-blue-100/40' : '')}`}>
                                        {isT && <span className="text-green-700 font-bold text-xl">G</span>}
                                        {isR && <RobotIcon dir={state.dir} />}
                                        {WALLS.has(`${x},${y}-${x+1},${y}`) && <div className="wall-v" />}
                                        {WALLS.has(`${x},${y}-${x},${y+1}`) && <div className="wall-h" />}
                                    </div>
                                );
                            })}
                        </div>

                        <div className="flex flex-col gap-3">
                            <div className="flex justify-between items-center bg-white/10 p-3 rounded-lg">
                                <span>Кроки: <span className="font-bold text-xl">{state.steps}</span></span>
                                <button onClick={reset} className="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-md transition">Скинути</button>
                            </div>
                            <button onClick={solve} disabled={isSolving} className={`w-full py-3 rounded-lg font-bold transition ${isSolving ? 'bg-gray-500 cursor-not-allowed' : 'bg-blue-500 hover:bg-blue-600'}`}>
                                {isSolving ? 'Робот думає...' : 'Показати розв\'язок'}
                            </button>
                            {state.status === 'SUCCESS' && (
                                <div className="success-overlay bg-green-500 p-4 rounded-lg text-center font-bold">
                                    Перемога! Пройдено за {state.steps} кроків.
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
